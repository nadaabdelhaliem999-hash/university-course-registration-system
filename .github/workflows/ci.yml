name: CI 

on:
  push:
    branches: [ "main" ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    # Build
    - name: Compile
      run: |
        g++ src/main.cpp src/user.cpp -Iinclude -o app
        g++ tests/test.cpp src/user.cpp -Iinclude -o test

    #  Test
    - name: Run tests
      run: ./test
      
 #  SonarQube Scan
    - name: SonarQube Scan
      if: github.ref == 'refs/heads/main'
      uses: SonarSource/sonarcloud-github-action@master
      with:
        projectBaseDir: .
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
