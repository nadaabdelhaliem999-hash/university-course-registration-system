name: CI Pipeline - C++

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build-and-test:
    name: Build, Test & SonarQube Analysis
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install C++ compiler and tools
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ build-essential bear gcovr

      - name: Build project
        run: |
          bear -- g++ -std=c++17 -Iinclude src/user.cpp src/main.cpp -o main
          echo "Build successful!"

      - name: Verify compile_commands.json exists
        run: |
          ls -la compile_commands.json
          echo "compile_commands.json found!"

      - name: Run unit tests with coverage
        run: |
          g++ -std=c++17 -Iinclude \
              --coverage -fprofile-arcs -ftest-coverage \
              src/user.cpp tests/test.cpp \
              -o test_run
          ./test_run

      - name: Generate coverage report
        run: |
          gcovr --sonarqube coverage.xml \
                --root . \
                --exclude tests/ \
                --exclude main.cpp
          echo "Coverage report generated!"
          cat coverage.xml

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
