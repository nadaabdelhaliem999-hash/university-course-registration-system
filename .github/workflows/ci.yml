name: C++ CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test-sonar:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    #  Build step
    - name: Compile code
      run: |
        g++ sprint1.cpp -o sprint1
        g++ sprint2.cpp -o sprint2
        g++ sprint3.cpp -o sprint3
        g++ test.cpp -o test

    # Test step
    - name: Run tests
      run: ./test

    #  SonarQube Scan
    - name: SonarQube Scan
      if: github.ref == 'refs/heads/main'
      uses: SonarSource/sonarcloud-github-action@master
      with:
        projectBaseDir: .
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
