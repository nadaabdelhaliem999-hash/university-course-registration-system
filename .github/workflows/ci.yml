name: Build

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build-and-test:
    name: Build, Test & SonarQube Analysis
    runs-on: ubuntu-latest  # Changed to ubuntu-latest (better for Python)

    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for SonarQube analysis
           # Step 2: Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      # Step 3: BUILD STEP - Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      # Step 4: TEST STEP - Run unit tests
      - name: Run unit tests
        run: |
          pytest tests/ -v --tb=short --cov=. --cov-report=xml --cov-report=term

           # Step 5: CODE QUALITY STEP - SonarQube scan
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          args: >
            -Dsonar.projectKey=nadaabdelhaliem999-hash_university-course-registration-system
            -Dsonar.organization=nadaabdelhaliem999-hash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
