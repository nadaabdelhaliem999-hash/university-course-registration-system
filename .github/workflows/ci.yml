name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-test-quality:
    runs-on: ubuntu-latest

    steps:
    # Checkout
    - name: Checkout code
      uses: actions/checkout@v3

    # Install compiler
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y g++

    # Build app
    - name: Build application
      run: |
        g++ -Iinclude src/main.cpp src/user.cpp -o app

    # Build tests
    - name: Build tests
      run: |
        g++ -Iinclude tests/test.cpp src/user.cpp -o test

    # Run tests
    - name: Run unit tests
      run: |
        ./test

    # SonarCloud scan
    - name: SonarCloud Scan
      uses: sonarsource/sonarqube-scan-action@v6
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
