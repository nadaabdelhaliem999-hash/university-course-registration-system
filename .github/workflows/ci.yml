name: CI

on:
  push:
    branches: [ "main" ]  
  pull_request:
    branches: [ "main" ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Required for SonarCloud

    # BUILD STEP - Compiles project dependencies
    - name: Build project
      run: |
        # For C++, this is the build/compile step
        g++ -c src/user.cpp -Iinclude -o user.o
        g++ src/main.cpp user.o -Iinclude -o app
        echo "Build complete"

    # TEST STEP - Runs unit tests automatically
    - name: Run unit tests
      run: |
        # Compile and run tests
        g++ tests/test.cpp src/user.cpp -Iinclude -o test
        ./test
        echo "All tests passed"

    # CODE QUALITY STEP - SonarCloud scan on main branch
    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@v5.0.0
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        
        args: >
          -Dsonar.branch.name=${{ github.ref_name }}
