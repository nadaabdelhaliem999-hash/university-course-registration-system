name: CI 

on:
  push:
    branches: [ "main" ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    # Build
    - name: Compile
      run: |
        g++ src/main.cpp src/user.cpp -Iinclude -o app
        g++ tests/test.cpp src/user.cpp -Iinclude -o test

    #  Test
    - name: Run tests
      run: ./test
      
 #  SonarCloud Scan 
    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@master
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: https://sonarcloud.io
