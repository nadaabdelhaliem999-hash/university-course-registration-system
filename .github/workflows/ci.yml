name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-test-quality:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y g++ bear

    - name: Generate compilation database with Bear
      run: |
        # Clean previous builds
        rm -f app test compile_commands.json
        
        # Generate compilation database for both app and tests
        bear --output compile_commands.json -- \
          bash -c "g++ -Iinclude src/main.cpp src/user.cpp -o app && \
                   g++ -Iinclude tests/test.cpp src/user.cpp -o test"
        
        # Show that compile_commands.json was created
        echo "compile_commands.json created"
        ls -la compile_commands.json

    - name: Run unit tests
      run: |
        ./test
        echo "All tests passed"

    - name: SonarCloud Scan
      uses: SonarSource/sonarqube-scan-action@v5.0.0
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: https://sonarcloud.io
