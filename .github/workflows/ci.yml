name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-test-quality:
    runs-on: ubuntu-latest

    steps:
    # 📥 Checkout code
    - uses: actions/checkout@v3

    # Install compiler
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y g++

    #  Build application
    - name: Build project
      run: |
        g++ src/main.cpp src/user.cpp src-Iinclude -o app

    #  Build and run tests
    - name: Build tests
      run: |
        g++ tests/test.cpp src/user.cpp-Iinclude -o test

    - name: Run tests
      run: ./test

    # 📊 SonarCloud analysis
    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@master
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: https://sonarcloud.io
