name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # Install dependencies
    - name: Install build tools
      run: |
        sudo apt-get update
        sudo apt-get install -y g++ lcov

    # Build with coverage flags
    - name: Compile with coverage
      run: |
        # Build tests with coverage
        g++ -g -O0 -fprofile-arcs -ftest-coverage tests/test.cpp src/user.cpp -Iinclude -o test

    # Run tests (this generates .gcda and .gcno files)
    - name: Run tests
      run: ./test

    # Generate coverage report 
    - name: Generate coverage
      run: |
        lcov --capture --directory . --output-file coverage.info --no-external --ignore-errors unused
        lcov --remove coverage.info '/usr/*' --output-file coverage.info --ignore-errors unused
        lcov --list coverage.info

    # SonarCloud Scan
    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@v5.0.0
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
