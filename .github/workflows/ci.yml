name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-test-quality:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y g++ bear

    - name: Generate Compilation Database
      run: |
        bear -- g++ -Iinclude src/main.cpp src/user.cpp -o app
        bear --append -- g++ -Iinclude tests/test.cpp src/user.cpp -o test

    - name: Build Application
      run: |
        g++ -Iinclude src/main.cpp src/user.cpp -o app

    - name: Build Tests
      run: |
        g++ -Iinclude tests/test.cpp src/user.cpp -o test

    - name: Run Unit Tests
      run: |
        ./test

    - name: SonarCloud Scan
      uses: SonarSource/sonarqube-scan-action@v5.0.0
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: https://sonarcloud.io
