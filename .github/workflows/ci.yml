name: CI Pipeline - C++

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build-and-test:
    name: Build, Test & SonarQube Analysis
    runs-on: ubuntu-latest

    steps:

      # ── Step 1: Get the code ──────────────────────
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for SonarQube

      # ── Step 2: Install C++ compiler (Build Step) ─
      - name: Install C++ compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ build-essential

      # ── Step 3: Build the project ─────────────────
      - name: Build project
        run: |
          g++ -Iinclude src/user.cpp src/main.cpp -o main
          echo "Build successful!"

      # ── Step 4: Run unit tests (Test Step) ────────
      - name: Run unit tests
        run: |
          g++ -Iinclude src/user.cpp tests/test.cpp -o test_run
          ./test_run

      # ── Step 5: SonarQube scan (Quality Step) ─────
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          args: >
            -Dsonar.projectKey=nadaabdelhaliem999-hash_university-course-registration-system
            -Dsonar.organization=nadaabdelhaliem999-hash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
