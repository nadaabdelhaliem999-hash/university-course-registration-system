name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-test-quality:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y g++

    - name: Download build-wrapper
      run: |
        curl -L -o build-wrapper-linux-x86.zip https://sonarcloud.io/static/cpp/build-wrapper-linux-x86.zip
        unzip build-wrapper-linux-x86.zip
        chmod +x build-wrapper-linux-x86/build-wrapper-linux-x86

    - name: Build with build-wrapper
      run: |
        ./build-wrapper-linux-x86/build-wrapper-linux-x86 --out-dir bw-output g++ -Iinclude src/main.cpp src/user.cpp -o app
        ./build-wrapper-linux-x86/build-wrapper-linux-x86 --out-dir bw-output g++ -Iinclude tests/test.cpp src/user.cpp -o test

    - name: Run unit tests
      run: |
        ./test

    - name: SonarCloud Scan
      uses: SonarSource/sonarqube-scan-action@v5.0.0
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: https://sonarcloud.io
