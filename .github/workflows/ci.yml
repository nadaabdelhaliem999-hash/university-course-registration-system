name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install build tools
      run: |
        sudo apt-get update
        sudo apt-get install -y g++

    - name: Compile
      run: |
        g++ src/main.cpp src/user.cpp -Iinclude -o app
        g++ tests/test.cpp src/user.cpp -Iinclude -o test

    - name: Run tests
      run: ./test

    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@v5.0.0
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
