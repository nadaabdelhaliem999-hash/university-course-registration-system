name: CI Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build-test-quality:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      fetch-depth: 0

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y g++

    - name: Build application
      run: |
        g++ -Iinclude src/main.cpp src/user.cpp -o app

    - name: Build tests
      run: |
        g++ -Iinclude tests/test.cpp src/user.cpp -o test

    - name: Run tests
      run: |
        ./test

    - name: SonarCloud Scan
      uses: SonarSource/sonarqube-scan-action@v6
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
