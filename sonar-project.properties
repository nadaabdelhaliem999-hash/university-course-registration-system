sonar.projectKey=nadaabdelhaliem999-hash_university-course-registration-system
sonar.organization=nadaabdelhaliem999-hash

# Paths to source directories
sonar.sources=src,include
sonar.tests=tests
sonar.test.inclusions=tests/*.cpp

# C++ configuration
sonar.cfamily.build-wrapper-output=bw-output
sonar.cfamily.gcov.reportsPath=.
sonar.cfamily.threads=1

# Coverage
sonar.coverageReportPaths=coverage.info

# Encoding
sonar.sourceEncoding=UTF-8

# Exclude build artifacts
sonar.exclusions=**/*.o, **/*.exe
